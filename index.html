<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Affiliate BKP</title>
  
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7323884483465344"
     crossorigin="anonymous"></script>
<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header input{
padding:8px;
border-radius:5px;
border:none;
width:200px;
}

.layout{
display:flex;
}

.sidebar{
width:200px;
background:#222;
color:white;
min-height:100vh;
padding:15px;
}

.sidebar h3{
margin-top:0;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:8px;
margin:5px 0;
background:#333;
border-radius:5px;
}

.sidebar a:hover{
background:#ff6a00;
}

.container{
flex:1;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.product:hover{
transform:scale(1.05);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
}

.product h3{
font-size:16px;
padding:10px;
}

button{
background:#ff6a00;
border:none;
padding:10px 15px;
color:white;
border-radius:5px;
cursor:pointer;
margin-bottom:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h2>Affiliate BKP</h2>

<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">

</header>

<div class="layout">

<div class="sidebar">

<h3>Categories</h3>

<a href="#" onclick="filter('phone')">Phones</a>
<a href="#" onclick="filter('laptop')">Laptop</a>
<a href="#" onclick="filter('watch')">Watch</a>
<a href="#" onclick="filter('tv')">TV</a>
<a href="#" onclick="filter('all')">All Products</a>

</div>

<div class="container" id="products"></div>

</div>

<footer>

© AffiliateBKP Deals

</footer>

<script>

const products=[

{name:"iPhone 15",cat:"phone",img:"https://m.media-amazon.com/images/I/61-r9zOKBCL._SL1500_.jpg",link:"https://amazon.in"},

{name:"Redmi Note 13",cat:"phone",img:"https://m.media-amazon.com/images/I/71tCOhEigtL._SL1500_.jpg",link:"#"},
{name:"MacBook Pro",cat:"laptop",img:"https://m.media-amazon.com/images/I/61TnX0PmqES._SL1500_.jpg",link:"#"},

{name:"Dell XPS",cat:"laptop",img:"https://m.media-amazon.com/images/I/61Qe0euJJZL._SL1500_.jpg",link:"#"},

{name:"Asus ROG",cat:"laptop",img:"https://m.media-amazon.com/images/I/81vZ2qW7R-L._SL1500_.jpg",link:"#"},
{name:"Smart Watch",cat:"watch",img:"https://m.media-amazon.com/images/I/61y2VVWcGBL._SL1500_.jpg",link:"#"},
{name:"Noise Watch",cat:"watch",img:"https://m.media-amazon.com/images/I/61epn29QG0L._SL1500_.jpg",link:"#"},
{name:"Boat Watch",cat:"watch",img:"https://m.media-amazon.com/images/I/61S9aVnR1FL._SL1500_.jpg",link:"#"},
{name:"Firebolt Watch",cat:"watch",img:"https://m.media-amazon.com/images/I/61S5K7V4Y+L._SL1500_.jpg",link:"#"},
{name:"Apple Watch",cat:"watch",img:"https://m.media-amazon.com/images/I/71eUhV3s9GL._SL1500_.jpg",link:"#"},
{name:"Samsung Smart TV",cat:"tv",img:"https://m.media-amazon.com/images/I/71niXI3lxlL._SL1500_.jpg",link:"#"},
{name:"LG Smart TV",cat:"tv",img:"https://m.media-amazon.com/images/I/81nC0Q1D5LL._SL1500_.jpg",link:"#"},

{name:"TCL Smart TV",cat:"tv",img:"https://m.media-amazon.com/images/I/81F+YdBvYUL._SL1500_.jpg",link:"#"}

]

// duplicate products to make ~50
while(products.length<50){
products.push(products[Math.floor(Math.random()*20)])
}

function showProducts(list){

let html=""

list.forEach(p=>{

html+=`

<div class="product">

<img src="${p.img}">

<h3>${p.name}</h3>

<button onclick="buy('${p.link}')">Buy Now</button>

</div>

`

})

document.getElementById("products").innerHTML=html

}

function buy(link){
window.location.href=link
}

function searchProduct(){

let text=document.getElementById("search").value.toLowerCase()

let filtered=products.filter(p=>p.name.toLowerCase().includes(text))

showProducts(filtered)

}

function filter(cat){

if(cat=="all") showProducts(products)

else{

let filtered=products.filter(p=>p.cat==cat)

showProducts(filtered)

}

}

showProducts(products.sort(()=>0.5-Math.random()))

</script>

</body>


</html>
